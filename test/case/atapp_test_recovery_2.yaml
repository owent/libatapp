# Copyright 2026 atframework
# F group - error recovery & proxy cascade test: proxy (hub node)
# Topology: node1(0x601) --proxy--> proxy(0x602) <--proxy-- downstream(0x603)
atapp:
  id: 0x00000602
  id_mask: 8.8.8.8
  name: "recovery-test-proxy"
  type_id: 1
  type_name: "recovery-test"

  bus:
    listen: "ipv4://127.0.0.1:22102"
    backlog: 256
    access_token_max_number: 5
    overwrite_listen_path: false
    topology:
      rule:
        allow_direct_connection: false
        require_same_upstream: false
    first_idle_timeout: 3600s
    ping_interval: 3600s
    retry_interval: 3s
    reconnect_start_interval: 2s
    reconnect_max_interval: 16s
    reconnect_max_try_times: 3
    lost_topology_timeout: 32s
    fault_tolerant: 3
    message_size: 64KB
    receive_buffer_size: 1MB
    send_buffer_size: 1MB
    send_buffer_number: 0
  timer:
    tick_interval: 8ms
    stop_timeout: 3s
    stop_interval: 256ms
  etcd:
    enable: false

  log:
    level: debug
    category:
      - name: default
        prefix: "[Log %L][%F %T.%f][%s:%n(%C)]: "
        stacktrace:
          min: error
          max: fatal
        sink:
          - type: stdout
            level:
              min: fatal
              max: debug
