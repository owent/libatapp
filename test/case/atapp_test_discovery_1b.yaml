# Copyright 2026 atframework
# E group - discovery lifecycle & reconnect test: node1 (E.3 variant)
# Same as discovery_1 but with max_interval=8s and max_try_times=8
# to observe exponential backoff capping behavior
atapp:
  id: 0x00000501
  id_mask: 8.8.8.8
  name: "discovery-test-node1"
  type_id: 1
  type_name: "discovery-test"

  bus:
    listen: "ipv4://127.0.0.1:22001"
    proxy: "ipv4://127.0.0.1:22003"
    backlog: 256
    access_token_max_number: 5
    overwrite_listen_path: false
    topology:
      rule:
        allow_direct_connection: true
        require_same_upstream: false
    first_idle_timeout: 3600s
    ping_interval: 3600s
    retry_interval: 3s
    reconnect_start_interval: 2s
    reconnect_max_interval: 8s
    reconnect_max_try_times: 8
    lost_topology_timeout: 32s
    fault_tolerant: 3
    message_size: 64KB
    receive_buffer_size: 1MB
    send_buffer_size: 1MB
    send_buffer_number: 0
  timer:
    tick_interval: 8ms
    stop_timeout: 3s
    stop_interval: 256ms
  etcd:
    enable: false

  log:
    level: debug
    category:
      - name: default
        prefix: "[Log %L][%F %T.%f][%s:%n(%C)]: "
        stacktrace:
          min: error
          max: fatal
        sink:
          - type: stdout
            level:
              min: fatal
              max: debug
