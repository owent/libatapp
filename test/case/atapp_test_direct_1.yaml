# B group - direct connection test: peer node 1
# Topology: node1(0x201) --proxy--> upstream(0x203) <--proxy-- node2(0x202)
# allow_direct_connection: true, so node1 and node2 are kSameUpstreamPeer
atapp:
  id: 0x00000201
  id_mask: 8.8.8.8
  name: "direct-test-node1"
  type_id: 1
  type_name: "direct-test"

  bus:
    listen: "ipv4://127.0.0.1:21701"
    proxy: "ipv4://127.0.0.1:21703"
    backlog: 256
    access_token_max_number: 5
    overwrite_listen_path: false
    topology:
      rule:
        allow_direct_connection: true
        require_same_upstream: false
    first_idle_timeout: 3600s
    ping_interval: 3600s
    retry_interval: 3s
    reconnect_start_interval: 2s
    reconnect_max_interval: 16s
    reconnect_max_try_times: 3
    lost_topology_timeout: 32s
    fault_tolerant: 3
    message_size: 64KB
    receive_buffer_size: 1MB
    send_buffer_size: 1MB
    send_buffer_number: 0
  timer:
    tick_interval: 8ms
    stop_timeout: 3s
    stop_interval: 256ms
  etcd:
    enable: false

  log:
    level: debug
    category:
      - name: default
        prefix: "[Log %L][%F %T.%f][%s:%n(%C)]: "
        stacktrace:
          min: error
          max: fatal
        sink:
          - type: stdout
            level:
              min: fatal
              max: debug
